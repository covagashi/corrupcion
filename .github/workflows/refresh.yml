name: Refresh data & deploy

# Runs the whole offline pipeline in CI, loads the results into the remote D1 database, and deploys
# the Worker. No local Node/Wrangler needed — everything runs here.
#
# One-time setup before this can succeed (see docs/deploy.md):
#   1. Create the D1 database and paste its id into wrangler.jsonc.
#   2. Add repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.

on:
  schedule:
    - cron: '0 3 1 * *' # monthly: 1st of the month, 03:00 UTC
  workflow_dispatch: # manual "Run workflow" button

# Avoid overlapping runs (a long import + a manual trigger).
concurrency:
  group: refresh-deploy
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      # --- Offline pipeline: download -> transform -> out/contracts.sql ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pipeline deps
        run: pip install -r pipeline/requirements.txt
      - name: Fetch raw data
        run: python pipeline/fetch.py
      - name: Transform + compute metric
        run: python pipeline/transform.py
      - name: Build legislators directory
        run: python pipeline/congress.py
      - name: Build public officials directory
        run: python pipeline/officials.py

      # --- Build the Worker ---
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install
        run: npm ci
      - name: Generate Worker types
        run: npm run gen
      - name: Build
        run: npm run build

      # --- Load D1 (schema first, then the rows) and deploy ---
      # All SQL is idempotent: schema.sql drops+recreates, the row dumps delete+insert.
      # The big dumps (contracts ~122 MB, officials ~21 MB) must be chunked: a single --file of
      # that size switches wrangler to the R2-upload import API, which hangs / 500s. ~5 MB chunks
      # stay on the reliable direct batched API. congress.sql / schema.sql are small -> direct.
      - name: Apply D1 schema
        run: npx wrangler d1 execute corrupcion-db --remote --file=db/schema.sql --yes
      - name: Load contracts into D1 (chunked)
        run: |
          python pipeline/split_sql.py pipeline/out/contracts.sql pipeline/out/chunks
          for f in pipeline/out/chunks/chunk_*.sql; do
            npx wrangler d1 execute corrupcion-db --remote --file="$f" --yes
          done
      - name: Load legislators into D1
        run: npx wrangler d1 execute corrupcion-db --remote --file=pipeline/out/congress.sql --yes
      - name: Load officials into D1 (chunked)
        run: |
          python pipeline/split_sql.py pipeline/out/officials.sql pipeline/out/chunks-officials
          for f in pipeline/out/chunks-officials/chunk_*.sql; do
            npx wrangler d1 execute corrupcion-db --remote --file="$f" --yes
          done
      - name: Deploy Worker
        run: npx wrangler deploy
